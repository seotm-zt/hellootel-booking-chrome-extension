<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Reporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <div class="popup__header">
      <div class="popup__eyebrow">Booking Saver</div>
      <h1>Dev Reporter</h1>
    </div>

    <!-- Login form -->
    <section id="loginSection">
      <p class="popup__hint">Sign in to send pages to the developer.</p>
      <form id="loginForm">
        <input type="text"     id="loginUsername" class="popup__input" placeholder="Username" required autocomplete="username" />
        <input type="password" id="loginPassword" class="popup__input" placeholder="Password" required autocomplete="current-password" />
        <button type="submit"  id="loginSubmit"   class="popup__button popup__button--primary">Sign in</button>
      </form>
    </section>

    <!-- Authenticated view -->
    <section id="authenticatedSection" hidden>
      <div class="popup__user-bar">
        <span id="userNameLabel" class="popup__user-name"></span>
        <button id="logoutButton" class="popup__button popup__button--sm" type="button">Sign out</button>
      </div>

      <div class="popup__dev-info">
        <p>Current page will be sent to the developer so a parser can be created for this site.</p>
      </div>

      <button id="sendToDev" class="popup__button popup__button--send" type="button">
        📤 Send to Developer
      </button>
    </section>

    <div id="status" class="popup__status" hidden></div>
  </main>

  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
