<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelloOtel Booking Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">

    <!-- Header -->
    <header class="popup__header">
      <div class="popup__brand">
        <img src="icons/icon32.png" class="popup__logo" alt="">
        <span class="popup__title">HelloOtel<br>Booking Saver</span>
      </div>
      <span class="popup__badge" id="bookingCount" hidden>0</span>
    </header>

    <!-- Login form -->
    <section id="loginSection" class="popup__login" hidden>
      <h2>Sign in</h2>
      <p>Use your HelloOtel username (login) and password</p>
      <form id="loginForm" class="popup__login-form">
        <input type="text"     id="loginUsername" class="popup__input" placeholder="Username" required autocomplete="username" />
        <input type="password" id="loginPassword" class="popup__input" placeholder="Password" required autocomplete="current-password" />
        <button type="submit"  id="loginSubmit"   class="popup__button popup__button--primary">Sign in</button>
      </form>
    </section>

    <!-- Authenticated view -->
    <section id="authenticatedSection" hidden>
      <div class="popup__user-bar">
        <span id="userNameLabel" class="popup__user-name"></span>
        <button id="logoutButton" class="popup__button popup__button--sm" type="button">Sign out</button>
      </div>
      <section id="bookingsList" class="popup__list"></section>
    </section>

    <div id="status" class="popup__status" hidden></div>

  </main>

  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
