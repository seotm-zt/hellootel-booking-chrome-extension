<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings Database</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="popup__hero">
        <div>
          <div class="popup__eyebrow">Booking Saver</div>
          <h1>Bookings Database</h1>
          <p id="heroSubtitle">Data is saved to the website database</p>
        </div>
        <div class="popup__count" id="bookingCount">0</div>
      </section>

      <!-- Send to Developer -->
      <section class="popup__dev-report">
        <div class="popup__dev-report-info">
          <strong>Unsupported booking site?</strong>
          <span>Send page to developer — we'll add support in the next update.</span>
        </div>
        <button id="sendToDev" class="popup__button popup__button--dev" type="button">
          Send to Developer
        </button>
      </section>

      <!-- Login form -->
      <section id="loginSection" class="popup__login" hidden>
        <h2>Sign in</h2>
        <p>Use your HellOotel username and password</p>
        <form id="loginForm" class="popup__login-form">
          <input
            type="text"
            id="loginUsername"
            class="popup__input"
            placeholder="Username"
            required
            autocomplete="username"
          />
          <input
            type="password"
            id="loginPassword"
            class="popup__input"
            placeholder="Password"
            required
            autocomplete="current-password"
          />
          <button type="submit" id="loginSubmit" class="popup__button popup__button--primary">
            Sign in
          </button>
        </form>
      </section>

      <!-- Authenticated view -->
      <section id="authenticatedSection" hidden>
        <div class="popup__user-bar">
          <span id="userNameLabel" class="popup__user-name"></span>
          <button id="logoutButton" class="popup__button popup__button--sm" type="button">Sign out</button>
        </div>

        <section class="popup__actions">
          <button id="exportJson" class="popup__button">Export JSON</button>
          <button id="clearBookings" class="popup__button popup__button--danger">Clear database</button>
        </section>

        <section id="bookingsList" class="popup__list"></section>
      </section>

      <div id="status" class="popup__status" hidden></div>
    </main>

    <!-- Confirm booking modal -->
    <div id="confirmModal" class="confirm-modal" hidden>
      <div class="confirm-modal__box">
        <div class="confirm-modal__header">
          <span class="confirm-modal__title">Confirm booking</span>
          <button id="confirmModalClose" class="confirm-modal__close" type="button">✕</button>
        </div>
        <form id="confirmForm" class="confirm-modal__form">
          <div class="confirm-modal__row">
            <label>Booking code</label>
            <input type="text" name="booking_code" class="popup__input" />
          </div>
          <div class="confirm-modal__row">
            <label>Hotel</label>
            <input type="text" name="hotel_name" class="popup__input" />
          </div>
          <div class="confirm-modal__row">
            <label>Room type</label>
            <input type="text" name="room_type_name" class="popup__input" />
          </div>
          <div class="confirm-modal__row2">
            <div>
              <label>Price</label>
              <input type="number" name="price" class="popup__input" step="0.01" min="0" />
            </div>
            <div>
              <label>Currency</label>
              <select name="currency_code" id="currencySelect" class="popup__input popup__select">
                <option value="">—</option>
              </select>
            </div>
          </div>
          <div class="confirm-modal__row2">
            <div>
              <label>Arrival</label>
              <input type="date" name="arrival_at" class="popup__input" />
            </div>
            <div>
              <label>Departure</label>
              <input type="date" name="departure_at" class="popup__input" />
            </div>
          </div>
          <div class="confirm-modal__row3">
            <div>
              <label>Adults</label>
              <input type="number" name="adults" class="popup__input" min="0" />
            </div>
            <div>
              <label>Children</label>
              <input type="number" name="children" class="popup__input" min="0" />
            </div>
            <div>
              <label>Infants</label>
              <input type="number" name="infants" class="popup__input" min="0" />
            </div>
          </div>
          <div id="confirmError" class="confirm-modal__error" hidden></div>
          <button type="submit" id="confirmSubmit" class="popup__button popup__button--primary">
            Confirm booking
          </button>
        </form>
      </div>
    </div>

    <script src="auth.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
