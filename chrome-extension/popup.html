<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopTravel Bookings Database</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="popup__hero">
        <div>
          <div class="popup__eyebrow">TopTravel Booking Saver</div>
          <h1>Bookings Database</h1>
          <p id="heroSubtitle">Data is saved to the toptravel.tours website database</p>
        </div>
        <div class="popup__count" id="bookingCount">0</div>
      </section>

      <!-- Send to Developer -->
      <section class="popup__dev-report">
        <div class="popup__dev-report-info">
          <strong>Unsupported booking site?</strong>
          <span>Send page to developer — we'll add support in the next update.</span>
        </div>
        <button id="sendToDev" class="popup__button popup__button--dev" type="button">
          Send to Developer
        </button>
      </section>

      <!-- Login form -->
      <section id="loginSection" class="popup__login" hidden>
        <h2>Sign in</h2>
        <p>Use your <code>toptravel.tours/admin</code> email and password</p>
        <form id="loginForm" class="popup__login-form">
          <input
            type="email"
            id="loginEmail"
            class="popup__input"
            placeholder="Email"
            required
            autocomplete="email"
          />
          <input
            type="password"
            id="loginPassword"
            class="popup__input"
            placeholder="Password"
            required
            autocomplete="current-password"
          />
          <button type="submit" id="loginSubmit" class="popup__button popup__button--primary">
            Sign in
          </button>
        </form>
      </section>

      <!-- Authenticated view -->
      <section id="authenticatedSection" hidden>
        <div class="popup__user-bar">
          <span id="userNameLabel" class="popup__user-name"></span>
          <button id="logoutButton" class="popup__button popup__button--sm" type="button">Sign out</button>
        </div>

        <section class="popup__actions">
          <button id="exportJson" class="popup__button">Export JSON</button>
          <button id="clearBookings" class="popup__button popup__button--danger">Clear database</button>
        </section>

        <section id="bookingsList" class="popup__list"></section>
      </section>

      <div id="status" class="popup__status" hidden></div>
    </main>

    <script src="toptravel-auth.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
